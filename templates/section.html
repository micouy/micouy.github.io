{% extends "index.html" %}

{% block content %}
<div class="post">
  <h1 class="section-title">{{ section.title }}</h1>
  {{ section.content | safe }}
  <div class="posts">
    {% for page in section.pages | reverse %}
      <div class="post">
        <h1 class="post-title">
          <a href="{{ page.permalink }}">
            {{ page.title }}
          </a>
        </h1>

		{% if page.date %}
        <span class="post-date">{{ page.date | date(format="%Y-%m-%d") }}</span>
        {% endif %}
      </div>
    {% endfor %}
  </div>
</div>
{% endblock content %}
