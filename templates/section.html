{% extends "index.html" %}

{% block header %}
  <h1 class="section-title">{{ section.title }}</h1>
{% endblock %}

{% block main %}
  {{ section.content | safe }}

<div class="posts">
{% for page in section.pages %}
  <div class="post">
    <a class="post-title" href="{{ page.permalink }}">
      {{ page.title }}
    </a>

	{% if page.date %}
    <span class="post-date">{{ page.date | date(format="%Y-%m-%d") }}</span>
    {% endif %}
  </div>
{% endfor %}
</div>
{% endblock main %}
